volumes:
  postgres_data:
  minio_data:


services:
  postgres:
    image: postgres:15-alpine
    container_name: lucro_certo_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lucrocerto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: lucro_certo_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c " /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin; /usr/bin/mc mb myminio/uploads; /usr/bin/mc anonymous set public myminio/uploads; exit 0; "

  api:
    build: .
    container_name: lucro_certo_api
    ports:
      - "3333:3333"
    environment:
      DATABASE_URL: "postgresql://admin:password@postgres:5432/lucrocerto?schema=public"
      JWT_SECRET: "supersecretkey"
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_BUCKET: "uploads"
      S3_PUBLIC_URL: "http://localhost:9000/uploads"
    depends_on:
      - postgres
      - minio
    command: sh -c "npx prisma migrate deploy && npm start"
